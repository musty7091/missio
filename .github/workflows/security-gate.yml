name: Missio Security Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-gate:
    name: Run security gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create CI environment file
        run: |
          cat > .env << 'EOF'
          MISSIO_APP_NAME=Missio
          MISSIO_ENVIRONMENT=local
          MISSIO_DEBUG=true
          MISSIO_DEFAULT_TIMEZONE=Europe/Istanbul
          MISSIO_DATABASE_URL=sqlite:///./missio_local.db
          MISSIO_SECRET_KEY=ci-local-security-gate-secret-key-for-tests-only-2026
          MISSIO_ACCESS_TOKEN_EXPIRE_MINUTES=60
          MISSIO_RATE_LIMIT_ENABLED=true
          MISSIO_RATE_LIMIT_MAX_REQUESTS=120
          MISSIO_RATE_LIMIT_WINDOW_SECONDS=60
          EOF

      - name: Run database migrations
        run: |
          python -m alembic upgrade head

      - name: Seed reference data
        run: |
          python -m app.commands.seed_database

      - name: Run centralized security gate
        run: |
          python -m app.commands.check_security_gate
